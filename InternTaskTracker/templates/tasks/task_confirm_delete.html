{% extends "base.html" %}
{% block title %}Delete Task{% endblock %}
{% block page_title %}Delete Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card panel border-danger">
            <div class="card-body text-center">
                <i class="bi bi-exclamation-triangle display-4 text-danger"></i>
                <h5 class="mt-3">Delete "{{ task.title }}"?</h5>
                <p class="text-muted">This will permanently remove the task logged on {{ task.date }}. This action cannot be undone.</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Yes, delete</button>
                    <a href="{% url 'task_detail' task.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
