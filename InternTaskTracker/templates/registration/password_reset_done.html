{% extends "auth_base.html" %}
{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="text-center">
    <i class="bi bi-envelope-check display-4 text-primary"></i>
    <h4 class="mt-3">Check your email</h4>
    <p class="text-muted">If an account exists with that email, we've sent a password reset link.</p>
    <a href="{% url 'login' %}" class="btn btn-outline-primary">Back to login</a>
</div>
{% endblock %}
