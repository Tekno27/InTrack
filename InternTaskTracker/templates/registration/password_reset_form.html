{% extends "auth_base.html" %}
{% load crispy_forms_tags %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<h4 class="mb-2">Forgot your password?</h4>
<p class="text-muted small">Enter your email and we'll send you a reset link.</p>
<form method="post" novalidate>
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary w-100 mt-2">Send reset link</button>
</form>
<div class="text-center mt-3 small"><a href="{% url 'login' %}">Back to login</a></div>
{% endblock %}
